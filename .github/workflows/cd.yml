name: SneakIn CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Run CI Checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile /dev/null" >> ~/.ssh/config

      - name: Pre-Deploy Database Backup
        run: |
          ssh -i ~/.ssh/deploy_key -T ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            mkdir -p ~/backups
            docker exec sneak-in-ecommerce-db-1 pg_dump -U postgres sneakin_db \
              > ~/backups/pre_deploy_\$(date +%Y%m%d_%H%M%S).sql 2>/dev/null || true
            ls -t ~/backups/pre_deploy_*.sql 2>/dev/null | tail -n +8 | xargs rm -f 2>/dev/null || true
          "

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -T ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            cd ~/Sneak-in-ecommerce
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput
            docker image prune -f
          "

      - name: Health Check
        run: |
          echo "Waiting 15s for containers to start..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 https://sneakin.duckdns.org/api/health/)
          if [ "$STATUS" != "200" ]; then
            echo "Health check FAILED — HTTP $STATUS"
            exit 1
          fi
          echo "Health check PASSED — HTTP $STATUS"

      - name: Deploy Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment successful!"
          else
            echo "Deployment had issues — check logs above"
          fi